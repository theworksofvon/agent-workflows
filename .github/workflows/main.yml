name: Main Branch Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * 1"

permissions:
  contents: read

concurrency:
  group: main-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform:
    name: Platform (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: "11.15.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test:typecheck
      - run: pnpm build
      - run: pnpm test
      - run: pnpm test:smoke
      - run: pnpm test:python

  quality:
    name: Main Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: "11.15.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm check:scripts
      - run: shellcheck scripts/*.sh
      - name: Validate GitHub Actions
        uses: docker://rhysd/actionlint:1.7.12

  security:
    name: Production Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: "11.15.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level high
